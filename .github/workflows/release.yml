name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --prune --force

          # latest tag or default
          LATEST=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
          echo "latest_tag=$LATEST" >> "$GITHUB_OUTPUT"

          # strip leading v
          BASE="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

          # gather commit messages since latest tag (or all if no tag)
          RANGE="${LATEST}..HEAD"
          if ! git rev-parse "$LATEST" &>/dev/null; then
            RANGE="HEAD"
          fi
          COMMITS=$(git log "$RANGE" --format="%s%n%b" --no-merges 2>/dev/null || echo "")

          BUMP="patch"

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+(\([^)]*\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\([^)]*\))?:"; then
            BUMP="patch"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          # write changelog to file for the release body
          echo "$COMMITS" | grep -E "^(feat|fix|docs|chore|refactor|test|ci|perf)(\([^)]*\))?:" > /tmp/CHANGELOG.md || true
          [ -s /tmp/CHANGELOG.md ] || echo "Release $NEW_TAG" > /tmp/CHANGELOG.md

      - name: Create annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.new_tag }}" -m "Release ${{ steps.tag.outputs.new_tag }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Build UI
        run: |
          cd ui && npm ci && npm run build

      - name: Build releases
        run: |
          for goos in linux darwin; do
            for goarch in amd64 arm64; do
              [ "$goos" = "darwin" ] && [ "$goarch" = "amd64" ] && continue
              GOOS=$goos GOARCH=$goarch \
                go build -ldflags="-X github.com/rapando/gopolice/cmd.Version=${{ steps.tag.outputs.new_tag }}" \
                -o gopolice_${goos}_${goarch} .
            done
          done

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body_path: /tmp/CHANGELOG.md
          files: gopolice_*
